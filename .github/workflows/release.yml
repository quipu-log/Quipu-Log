name: release

# Tag-triggered publish. Cut a release by pushing an annotated tag whose name
# matches the workspace version, e.g. `git tag v0.1.1 && git push origin v0.1.1`.
# This job verifies, tests, then publishes all crates to crates.io in dependency
# order. Requires a CRATES_IO_TOKEN repository secret (Settings → Secrets and
# variables → Actions). See RELEASING.md for the full procedure.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: tag matches workspace version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(sed -nE 's/^version = "([^"]+)".*/\1/p' Cargo.toml | head -1)
          echo "tag=$tag  Cargo.toml=$ver"
          test "$tag" = "$ver" || { echo "::error::tag v$tag does not match workspace version $ver"; exit 1; }

      - name: gate on a green build + tests
        run: cargo test --workspace --release

      # Publish in dependency order. `cargo publish` waits for each crate to be
      # available in the index before returning, so the next one resolves it.
      - run: cargo publish -p quipu-core
      - run: cargo publish -p quipu-middleware
      - run: cargo publish -p quipu-client
      - run: cargo publish -p quipu-server
      - run: cargo publish -p quipu-mcp
