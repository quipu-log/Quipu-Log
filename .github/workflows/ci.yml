name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build:
    name: release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release

  # dependency vulnerability scan against the RustSec advisory DB; accepted
  # advisories are listed (with rationale) in .cargo/audit.toml + SECURITY.md
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  # short per-PR smoke: each fuzz target runs briefly so format/parser
  # regressions surface before merge; the long runs live in nightly.yml
  fuzz-smoke:
    name: fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          # cargo-fuzz instruments std with a sanitizer, which needs to rebuild
          # core/std from source — without rust-src that fails with
          # "can't find crate for `core`".
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # pin the gnu target: cargo-fuzz otherwise defaults to musl on the runner,
      # whose static libc is incompatible with the AddressSanitizer build.
      - run: cargo fuzz run segment_reader --target x86_64-unknown-linux-gnu -- -max_total_time=45 -rss_limit_mb=4096
      - run: cargo fuzz run dlq_redrive --target x86_64-unknown-linux-gnu -- -max_total_time=45 -rss_limit_mb=4096
